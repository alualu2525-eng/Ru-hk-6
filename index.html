<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 港澳吃喝團</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/vuedraggable@4.1.0/dist/vuedraggable.umd.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #0a192f; /* 深藍色背景，延伸夜景風格 */
            color: #e6f1ff;
            -webkit-tap-highlight-color: transparent;
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            min-height: 100vh;
            padding-bottom: 80px;
        }

        /* 頂部圓弧設計 */
        .header-banner {
            background: linear-gradient(rgba(10, 25, 47, 0.6), rgba(10, 25, 47, 0.9)), 
                        url('https://images.unsplash.com/photo-1506158669146-619067262a00?q=80&w=2070&auto=format&fit=crop'); /* 示意圖，會被Banner替代 */
            background-size: cover;
            background-position: center;
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            position: relative;
            z-index: 1;
        }

        .main-content {
            margin-top: -40px; /* 負邊距上移 */
            background: #f8fafc;
            border-radius: 30px 30px 0 0;
            position: relative;
            z-index: 2;
            color: #1e293b;
            min-height: calc(100vh - 180px);
        }

        /* 橫向滑動日期選單 */
        .date-slider {
            display: flex;
            overflow-x: auto;
            scrollbar-width: none;
            gap: 12px;
            padding: 20px;
        }
        .date-slider::-webkit-scrollbar { display: none; }

        .date-item {
            min-width: 65px;
            height: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            background: white;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .date-item.active {
            background: #1d4ed8;
            color: white;
        }

        /* 行程卡片樣式 */
        .itinerary-card {
            background: white;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-left: 5px solid #1d4ed8;
        }

        /* 底部導覽列 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-top: 1px solid #e2e8f0;
            z-index: 50;
        }

        .floating-btn {
            position: fixed;
            bottom: 90px;
            right: 20px;
            background: #1d4ed8;
            color: white;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(29, 78, 216, 0.4);
            z-index: 40;
        }
    </style>
</head>
<body>

<div id="app" class="app-container">
    <header class="header-banner">
        <h1 class="text-xl font-bold text-white tracking-widest">
            2026 港澳吃喝團之小馬哥首航
        </h1>
    </header>

    <div class="main-content">
        <div v-if="activeTab === 'itinerary'">
            <div class="px-6 pt-6 flex items-center justify-between">
                <div>
                    <p class="text-xs text-gray-500">今日天氣 - 香港</p>
                    <div class="flex items-center gap-2">
                        <i data-lucide="sun" class="text-yellow-500 w-5"></i>
                        <span class="text-lg font-bold">28°C</span>
                        <span class="text-xs text-gray-400">體感 31°C</span>
                    </div>
                </div>
            </div>

            <div class="date-slider">
                <div v-for="d in dates" :key="d.date" 
                     @click="currentDate = d.date"
                     :class="['date-item', currentDate === d.date ? 'active' : '']">
                    <span class="text-xs opacity-70">{{ d.weekday }}</span>
                    <span class="text-xl font-bold">{{ d.day }}</span>
                </div>
            </div>

            <div class="px-4">
                <draggable v-model="itinerary[currentDate]" item-key="id" handle=".drag-handle">
                    <template #item="{element, index}">
                        <div>
                            <div v-if="index > 0" class="flex items-center gap-2 px-6 py-2 text-xs text-blue-500 font-medium">
                                <i data-lucide="bus" class="w-3"></i>
                                <span>約 45 分鐘</span>
                            </div>

                            <div :class="['itinerary-card', element.type === 'flight' ? 'bg-blue-50' : '']">
                                <div class="flex justify-between items-start mb-2">
                                    <span class="text-xs font-bold text-blue-600 px-2 py-1 bg-blue-100 rounded">{{ element.category }}</span>
                                    <div class="flex gap-2">
                                        <div class="drag-handle cursor-move opacity-30"><i data-lucide="grip-vertical"></i></div>
                                    </div>
                                </div>
                                <h3 @click="openNav(element.name)" class="text-lg font-bold flex items-center gap-1 cursor-pointer">
                                    {{ element.name }}
                                    <i data-lucide="map-pin" class="w-4 text-red-500"></i>
                                </h3>
                                <p class="text-sm text-gray-600 mt-1"><i data-lucide="clock" class="inline w-3"></i> {{ element.time }}</p>
                                <p v-if="element.note" class="text-sm text-gray-500 mt-2 bg-gray-50 p-2 rounded">
                                    <i data-lucide="info" class="inline w-3"></i> {{ element.note }}
                                </p>
                            </div>
                        </div>
                    </template>
                </draggable>
            </div>

            <div class="floating-btn" @click="addItinerary">
                <i data-lucide="plus"></i>
            </div>
        </div>

        <div v-if="activeTab === 'info'" class="p-6">
            <h2 class="text-2xl font-bold mb-6">旅遊工具箱</h2>
            
            <div class="bg-white p-4 rounded-2xl shadow-sm mb-4">
                <label class="text-xs font-bold text-gray-400">匯率換算 (MOP/HKD ➔ TWD)</label>
                <div class="flex gap-2 mt-2">
                    <input v-model="exAmount" type="number" class="w-1/2 p-2 border rounded-lg" placeholder="輸入金額">
                    <div class="flex items-center text-xl font-bold text-blue-600">
                        ≈ ${{ (exAmount * 4.1).toFixed(0) }} TWD
                    </div>
                </div>
            </div>

            <div class="bg-white p-4 rounded-2xl shadow-sm mb-4">
                <h3 class="font-bold flex items-center gap-2"><i data-lucide="hotel" class="text-blue-500"></i> 住宿資訊</h3>
                <div class="mt-3 text-sm space-y-2">
                    <div class="p-2 border-b">
                        <p class="font-bold">旭逸酒店 荃灣</p>
                        <p class="text-gray-500">葵涌圳邊街15-19號</p>
                    </div>
                    <div class="p-2">
                        <p class="font-bold">利澳酒店 澳門</p>
                        <p class="text-gray-500">新口岸高美士街33號</p>
                    </div>
                </div>
            </div>
        </div>

        <div v-if="activeTab === 'shop'" class="p-6 text-center">
            <i data-lucide="shopping-basket" class="w-12 h-12 mx-auto text-gray-300 mb-4"></i>
            <p class="text-gray-400">尚未新增購物項目</p>
            <div class="floating-btn"><i data-lucide="plus"></i></div>
        </div>

        <div v-if="activeTab === 'cost'" class="p-6">
            <div class="bg-blue-600 text-white p-6 rounded-3xl mb-6">
                <p class="opacity-80">總花費估算 (HKD)</p>
                <h2 class="text-3xl font-bold">$ 4,250</h2>
            </div>
            <div class="floating-btn"><i data-lucide="plus"></i></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <button @click="activeTab = 'itinerary'" :class="activeTab === 'itinerary' ? 'text-blue-600' : 'text-gray-400'">
            <i data-lucide="map"></i>
            <span class="text-[10px] block">行程</span>
        </button>
        <button @click="activeTab = 'info'" :class="activeTab === 'info' ? 'text-blue-600' : 'text-gray-400'">
            <i data-lucide="info"></i>
            <span class="text-[10px] block">資訊</span>
        </button>
        <button @click="activeTab = 'shop'" :class="activeTab === 'shop' ? 'text-blue-600' : 'text-gray-400'">
            <i data-lucide="shopping-basket"></i>
            <span class="text-[10px] block">購物</span>
        </button>
        <button @click="activeTab = 'cost'" :class="activeTab === 'cost' ? 'text-blue-600' : 'text-gray-400'">
            <i data-lucide="wallet"></i>
            <span class="text-[10px] block">花費</span>
        </button>
    </nav>
</div>

<script>
    const { createApp, ref, onMounted, updated } = Vue;

    createApp({
        setup() {
            const activeTab = ref('itinerary');
            const currentDate = ref('2026-08-28');
            const exAmount = ref(0);

            const dates = [
                { weekday: 'FRI', day: '28', date: '2026-08-28' },
                { weekday: 'SAT', day: '29', date: '2026-08-29' },
                { weekday: 'SUN', day: '30', date: '2026-08-30' }
            ];

            const itinerary = ref({
                '2026-08-28': [
                    { id: 1, type: 'flight', category: '航班', name: 'HB703 香港機場', time: '13:30 抵達', note: '抵達後前往 S1 巴士站' },
                    { id: 2, type: 'shop', category: '購物', name: '東薈城 (COACH)', time: '15:00 - 17:00', note: '推薦逛 COACH，Outlet 折扣大' },
                    { id: 3, type: 'hotel', category: '住宿', name: '旭逸酒店 荃灣', time: '18:00 Check-in', note: '搭乘 E32 往葵興站' }
                ],
                '2026-08-29': [
                    { id: 4, type: 'food', category: '美食', name: '一點心 One Dim Sum', time: '10:30', note: '必點：薄皮鮮蝦餃、炸鮮奶' }
                ],
                '2026-08-30': []
            });

            const openNav = (query) => {
                const url = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(query)}`;
                window.open(url, '_blank');
            };

            const refreshIcons = () => {
                lucide.createIcons();
            };

            onMounted(refreshIcons);
            updated(refreshIcons);

            return { activeTab, dates, currentDate, itinerary, openNav, exAmount };
        }
    })
    .component('draggable', window.vuedraggable)
    .mount('#app');
</script>
</body>
</html>
